<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <title>ProposalIQ — منصة العروض الذكية</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* التنسيق الأصلي الخاص بك من ملف L.txt */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #ec4899;
            --bg-main: #f8fafc;
            --text-dark: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .app-container {
            width: 100%; max-width: 480px;
            background: #fff; min-height: 100vh;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
            padding: 20px; box-sizing: border-box;
        }

        .header-logo {
            text-align: center; padding: 30px 0;
        }

        .header-logo h1 {
            font-size: 28px; font-weight: 800; color: var(--primary);
            letter-spacing: -1px; margin: 0;
        }

        .feature-card {
            background: #fff; border: 1px solid #f1f5f9;
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }

        .feature-card:active { transform: scale(0.98); }

        .btn-main {
            width: 100%; background: var(--primary); color: white;
            border: none; padding: 15px; border-radius: 12px;
            font-weight: 700; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* تنسيق النوافذ المنبثقة (Modals) كما في ملفك */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px); z-index: 9999;
            justify-content: center; align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-body {
            background: white; width: 90%; max-width: 400px;
            border-radius: 24px; padding: 30px; position: relative;
            text-align: center;
        }

        .loader-spin {
            font-size: 40px; color: var(--primary);
            animation: fa-spin 1s infinite linear;
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%; padding: 12px; border: 2px solid #f1f5f9;
            border-radius: 12px; margin: 10px 0; font-family: inherit;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-logo">
        <h1>ProposalIQ 🚀</h1>
        <p style="color: #64748b;">ذكاء اصطناعي يصنع لك الصفقات</p>
    </div>

    <div class="feature-card">
        <div style="font-size: 24px; margin-bottom: 10px;">⚡</div>
        <h3 style="margin: 0;">توليد عرض احترافي</h3>
        <p style="color: #64748b; font-size: 14px;">حوّل أفكارك إلى ملف PDF جاهز في ثوانٍ.</p>
        <button class="btn-main" onclick="startAiGeneration()">ابدأ التوليد الذكي</button>
    </div>

    <div class="feature-card" style="border-right: 4px solid var(--secondary);">
        <div style="font-size: 24px; margin-bottom: 10px;">🤖</div>
        <h3 style="margin: 0;">ضمان القبول والتعديل</h3>
        <p style="color: #64748b; font-size: 14px;">حلل سبب رفض العميل وعدّل العرض فوراً.</p>
        <button class="btn-main" style="background: #334155;" onclick="openModal('retentionModal')">تحليل الرفض</button>
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <button onclick="openModal('activationModal')" style="background: none; border: none; color: var(--primary); font-weight: 700; cursor: pointer;">
            لديك رمز تفعيل؟ اضغط هنا
        </button>
    </div>
</div>

<div class="modal-overlay" id="activationModal">
    <div class="modal-body">
        <h3>تفعيل الاشتراك</h3>
        <input type="text" id="activationCode" placeholder="أدخل الرمز (مثال: PRO-123)">
        <button class="btn-main" onclick="doActivate()">تفعيل الآن</button>
        <button onclick="closeModal('activationModal')" style="margin-top:15px; background:none; border:none; color:#64748b;">إغلاق</button>
    </div>
</div>

<div class="modal-overlay" id="aiGeneratingModal">
    <div class="modal-body">
        <i class="fas fa-bolt loader-spin"></i>
        <h3 id="aiLoadingStep">جارٍ التفكير...</h3>
        <p style="color: #64748b;">الذكاء الاصطناعي يقوم بصياغة عرضك الآن</p>
    </div>
</div>

<div class="modal-overlay" id="retentionModal">
    <div class="modal-body">
        <h3>🤖 مساعد التعديل الذكي</h3>
        <p style="font-size: 14px; color: #64748b;">لماذا لم يعجب العرض العميل؟</p>
        <textarea id="rejectionReason" placeholder="مثال: السعر كان عالياً جداً..."></textarea>
        <button class="btn-main" onclick="analyzeRejection()">تحليل وإعادة صياغة</button>
        <button onclick="closeModal('retentionModal')" style="margin-top:15px; background:none; border:none; color:#64748b;">إلغاء</button>
    </div>
</div>

<script type="module">
    // الربط الصحيح ببيانات Firebase الخاصة بك
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyChxttvld06MmlSTD4JB11mYZNA06AP4T8",
        authDomain: "proposaliq-97d80.firebaseapp.com",
        projectId: "proposaliq-97d80",
        storageBucket: "proposaliq-97d80.firebasestorage.app",
        messagingSenderId: "183384951638",
        appId: "1:183384951638:web:8c0d6ce87c0c22f14064f7",
        measurementId: "G-HTD6YLRY8X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // وظائف المودال
    window.openModal = (id) => document.getElementById(id).classList.add('active');
    window.closeModal = (id) => document.getElementById(id).classList.remove('active');

    // وظيفة التفعيل (إصلاح مشكلة الربط)
    window.doActivate = async () => {
        const code = document.getElementById('activationCode').value.trim();
        if(!code) return Swal.fire('تنبيه', 'أدخل الرمز أولاً', 'info');

        try {
            const q = query(collection(db, 'tokens'), where('code', '==', code));
            const snap = await getDocs(q);
            if (snap.empty) return Swal.fire('خطأ', 'هذا الرمز غير موجود', 'error');
            
            const tokenDoc = snap.docs[0];
            if (tokenDoc.data().used) return Swal.fire('تنبيه', 'الرمز مستخدم مسبقاً', 'warning');

            await updateDoc(doc(db, 'tokens', tokenDoc.id), { used: true, usedAt: serverTimestamp() });
            Swal.fire('تم!', 'تم تفعيل حسابك بنجاح 🚀', 'success');
            closeModal('activationModal');
        } catch (e) {
            Swal.fire('خطأ', 'تأكد من إعدادات Firestore Rules في لوحة Firebase', 'error');
        }
    };

    // وظيفة الذكاء الاصطناعي (الميزة الجديدة)
    window.startAiGeneration = () => {
        openModal('aiGeneratingModal');
        const steps = ["جارٍ تحليل المدخلات...", "بناء الهيكل العرض...", "تنسيق النسخة النهائية...", "جاهز!"];
        let i = 0;
        const interval = setInterval(() => {
            document.getElementById('aiLoadingStep').innerText = steps[i];
            i++;
            if (i >= steps.length) {
                clearInterval(interval);
                setTimeout(() => {
                    closeModal('aiGeneratingModal');
                    Swal.fire('نجاح', 'تم توليد العرض بنجاح!', 'success');
                }, 1000);
            }
        }, 1500);
    };

    // وظيفة ضمان القبول
    window.analyzeRejection = () => {
        const reason = document.getElementById('rejectionReason').value;
        if(!reason) return Swal.fire('تنبيه', 'يرجى كتابة سبب الرفض', 'info');
        closeModal('retentionModal');
        window.startAiGeneration();
    };
</script>

</body>
</html>
