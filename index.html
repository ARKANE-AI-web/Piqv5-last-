<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <title>ProposalIQ - منصة العروض الذكية</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* التنسيق الأصلي الخاص بك (بدون تغيير) */
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; }
        .navbar { background: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-primary { background: var(--primary-color); color: white; }
        
        /* إضافة بسيطة لزر الدفع والإدارة ليناسب تنسيقك */
        .btn-success { background: #28a745; color: white; }
        .btn-dark { background: #343a40; color: white; }
        .token-item { background: #e9ecef; padding: 5px 10px; margin: 5px; border-radius: 4px; display: inline-block; font-family: monospace; }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="font-size: 20px; font-weight: bold; color: var(--primary-color);">ProposalIQ</div>
    <div id="nav-actions">
        </div>
</nav>

<div class="container">
    
    <div id="page-login" class="page active">
        <div class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
            <h2>تسجيل الدخول</h2>
            <input type="email" id="login-email" placeholder="البريد الإلكتروني" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd;">
            <input type="password" id="login-pass" placeholder="كلمة المرور" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd;">
            <button class="btn btn-primary" style="width: 100%;" onclick="app.auth.login()">دخول</button>
            <p style="margin-top:15px">ليس لديك حساب؟ <a href="#" onclick="showPage('page-register')">سجل الآن</a></p>
        </div>
    </div>

    <div id="page-dashboard" class="page">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>لوحة التحكم</h2>
            <div>
                <button class="btn btn-dark" id="admin-btn" style="display:none;" onclick="showPage('page-admin')"><i class="fas fa-user-shield"></i> الإدارة العليا</button>
                <button class="btn btn-success" onclick="app.payments.showOptions()"><i class="fas fa-credit-card"></i> ترقية الحساب</button>
                <button class="btn btn-primary" onclick="showPage('page-new-proposal')">+ عرض جديد</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-chart-line"></i> أداء المبيعات</h3>
            <div style="background:#eee; height:15px; border-radius:10px; overflow:hidden;">
                <div id="sales-progress" style="background:var(--primary-color); height:100%; width:0%;"></div>
            </div>
            <p id="sales-status" style="font-size: 14px; margin-top:5px;">المبيعات الحالية: 0 / 15,000 ريال</p>
        </div>

        <div class="card">
            <h3>العروض الأخيرة</h3>
            <table style="width: 100%; border-collapse: collapse;">
                <tbody id="proposals-table"></tbody>
            </table>
        </div>
    </div>

    <div id="page-admin" class="page">
        <div class="card">
            <button class="btn" onclick="showPage('page-dashboard')">← عودة</button>
            <h2>توليد رموز التفعيل (Promocodes)</h2>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <select id="token-plan" style="padding:10px; border:1px solid #ddd; border-radius:5px;">
                    <option value="basic">الباقة الأساسية</option>
                    <option value="pro">الباقة المتقدمة</option>
                </select>
                <input type="number" id="token-qty" value="1" min="1" style="padding:10px; border:1px solid #ddd; border-radius:5px; width:70px;">
                <button class="btn btn-primary" onclick="app.admin.generateTokens()">توليد الرموز</button>
            </div>
            <div id="token-list" style="margin-top:20px;"></div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // تكوين Firebase الأصلي الخاص بك
    const firebaseConfig = {
        apiKey: "AlzaSyChxttvld0...", // ضع مفتاحك هنا
        authDomain: "proposaliq.firebaseapp.com",
        projectId: "proposaliq",
        storageBucket: "proposaliq.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    const fb = initializeApp(firebaseConfig);
    const auth = getAuth(fb);
    const db = getFirestore(fb);

    // كائن التطبيق المدمج
    window.app = {
        user: null,
        
        auth: {
            async login() {
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-pass').value;
                try {
                    await signInWithEmailAndPassword(auth, email, pass);
                } catch (e) { Swal.fire('خطأ', 'تأكد من البريد وكلمة المرور', 'error'); }
            },
            logout() { signOut(auth).then(() => location.reload()); }
        },

        admin: {
            async generateTokens() {
                const plan = document.getElementById('token-plan').value;
                const qty = document.getElementById('token-qty').value;
                let listDiv = document.getElementById('token-list');
                for(let i=0; i < qty; i++){
                    const code = "IQ-" + Math.random().toString(36).substring(7).toUpperCase();
                    await addDoc(collection(db, "tokens"), { code, plan, used: false, createdAt: serverTimestamp() });
                    listDiv.innerHTML += `<span class="token-item">${code} (${plan})</span>`;
                }
                Swal.fire('تم التوليد', 'تمت إضافة الرموز بنجاح', 'success');
            }
        },

        payments: {
            showOptions() {
                Swal.fire({
                    title: 'ترقية الحساب',
                    html: `
                        <p>اختر الباقة المناسبة لك:</p>
                        <button class="btn btn-primary" onclick="app.payments.pay('basic')">الأساسية (99 ر.س)</button><br><br>
                        <button class="btn btn-primary" onclick="app.payments.pay('pro')">المتقدمة (249 ر.س)</button>
                    `,
                    showConfirmButton: false
                });
            },
            pay(plan) {
                Swal.fire('بوابة الدفع', 'سيتم تحويلك لإنهاء عملية الدفع لباقة ' + plan, 'info');
                // هنا يتم ربط Stripe أو Moyasar
            }
        }
    };

    // مراقب الحالة وتحديث البيانات حياً (Real-time Fix)
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            const userRef = doc(db, "users", u.uid);
            const userSnap = await getDoc(userRef);
            app.user = userSnap.data();

            // إظهار زر الإدارة للمدراء فقط
            if(app.user.role === 'admin' || app.user.email === 'admin@proposaliq.com') {
                document.getElementById('admin-btn').style.display = 'inline-block';
            }

            document.getElementById('nav-actions').innerHTML = `
                <span style="margin-left:10px;">${u.email}</span>
                <button class="btn btn-primary" style="padding:5px 10px;" onclick="app.auth.logout()">خروج</button>
            `;
            
            showPage('page-dashboard');
            listenToProposals(u.uid);
        } else {
            showPage('page-login');
        }
    });

    // تحديث العروض والأهداف تلقائياً (Fix Firebase)
    function listenToProposals(uid) {
        const q = query(collection(db, "proposals"), where("userId", "==", uid));
        onSnapshot(q, (snapshot) => {
            let html = "";
            let totalSales = 0;
            snapshot.forEach((doc) => {
                const p = doc.data();
                if(p.status === 'accepted') totalSales += p.total;
                html += `<tr>
                    <td style="padding:10px; border-bottom:1px solid #eee;">${p.client}</td>
                    <td style="border-bottom:1px solid #eee;">${p.total} ر.س</td>
                    <td style="border-bottom:1px solid #eee;">${p.status}</td>
                </tr>`;
            });
            document.getElementById('proposals-table').innerHTML = html;
            updateSalesGoal(totalSales);
        });
    }

    function updateSalesGoal(current) {
        const target = 15000;
        const percent = (current / target) * 100;
        document.getElementById('sales-progress').style.width = Math.min(percent, 100) + "%";
        document.getElementById('sales-status').innerText = `المبيعات الحالية: ${current} / ${target} ريال`;
    }

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

</script>
</body>
</html>
