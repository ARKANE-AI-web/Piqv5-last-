/* ── Compat wrappers: mirror the modular API used throughout the app ── */
function initializeApp(cfg){ return firebase.initializeApp(cfg); }
function getAuth(){ return firebase.auth(); }
function getFirestore(){ return firebase.firestore(); }
function doc(db,...args){
  if(args.length===1)return db.doc(args[0]);
  if(args.length===2)return db.collection(args[0]).doc(args[1]);
  let ref=db; for(let i=0;i<args.length;i++) ref=(i%2===0)?ref.collection(args[i]):ref.doc(args[i]); return ref;
}
function collection(db,path){return db.collection(path);}
function query(ref,...constraints){let q=ref;for(const c of constraints)q=c(q);return q;}
function where(field,op,val){return q=>q.where(field,op,val);}
async function getDoc(ref){return await ref.get();}
async function setDoc(ref,data){return await ref.set(data);}
async function updateDoc(ref,data){return await ref.update(data);}
async function addDoc(colRef,data){return await colRef.add(data);}
async function getDocs(q){return await q.get();}
function onSnapshot(q,cb){return q.onSnapshot(cb);}
function serverTimestamp(){return firebase.firestore.FieldValue.serverTimestamp();}
function increment(n){return firebase.firestore.FieldValue.increment(n);}
function onAuthStateChanged(auth,cb){return auth.onAuthStateChanged(cb);}
async function createUserWithEmailAndPassword(auth,email,pass){return await auth.createUserWithEmailAndPassword(email,pass);}
async function signInWithEmailAndPassword(auth,email,pass){return await auth.signInWithEmailAndPassword(email,pass);}
async function signOut(auth){return await auth.signOut();}
async function sendPasswordResetEmail(auth,email){return await auth.sendPasswordResetEmail(email);}
/* ── Safe clipboard copy with execCommand fallback for Safari ── */
function _safeCopy(text){
  if(navigator.clipboard&&navigator.clipboard.writeText)
    return navigator.clipboard.writeText(text).catch(()=>_execCopy(text));
  return _execCopy(text);
}
function _execCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);return Promise.resolve();
}

                function escapeHtml(str) {
                                if (!str) return '';

                function generateRef(count) {

                window.checkPasswordStrength = pw => {
                                const bar=document.getElementById('pwStrengthBar');
                                const label=document.getElementById('pwStrengthLabel');
                                if(!bar||!label)return;
                                if(!pw){bar.className='pw-strength';label.textContent='';return;}
                                let score=0;
                                if(pw.length>=8)score++; if(pw.length>=12)score++;
                                if(/[A-Z]/.test(pw))score++; if(/[0-9]/.test(pw))score++;
                                if(/[^A-Za-z0-9]/.test(pw))score++;
                                if(score<=2){bar.className='pw-strength weak';label.textContent='⚠️ ضعيفة';label.style.color='var(--danger)';}
                                else if(score<=3){bar.className='pw-strength medium';label.textContent='⚡ متوسطة';label.style.color='var(--warning)';}
                                else{bar.className='pw-strength strong';label.textContent='✅ قوية';label.style.color='var(--success)';}

                window.doRegister = async () => {

                                // agents
                                const agentsQ = query(collection(db,'users'), where('companyId','==',currentUserDoc.companyId), where('role','==','agent'));
                                const agentsSnap = await getDocs(agentsQ);

                                document.getElementById('mgrSentProps').textContent = allProps.filter(p=>p.status==='sent'||p.status==='approved').length;
                                document.getElementById('mgrAcceptedProps').textContent = allProps.filter(p=>p.status==='accepted').length;

                                // pending approvals

                                document.getElementById('mgrPendingCount').textContent = pending.length>0?pending.length:'';

                                const approvalsList = document.getElementById('mgrApprovalsList');

                                allPropsDiv.innerHTML='';

                                                allPropsDiv.innerHTML='<div style="text-align:center;padding:24px;color:var(--muted);font-size:.86rem">لا توجد عروض بعد</div>';

                                                                                <button class="btn btn-ghost btn-sm" onclick="openProposal('${p.id}')">عرض</button>

                                                });

                                }
                                startLiveTracking();
                }

                function startLiveTracking() {
                                if (liveUnsubscribe) liveUnsubscribe();
                                if (!currentUserDoc?.companyId) return;
                                const liveQ = query(collection(db,'proposals'), where('companyId','==',currentUserDoc.companyId), where('isClientLive','==',true));
                                liveUnsubscribe = onSnapshot(liveQ, (snapshot) => {
                                                snapshot.docChanges().forEach(change => {
                                                                if (change.type === 'added' || change.type === 'modified') {
                                                                                const d = change.doc.data();
                                                                                if (d.isClientLive) {
                                                                                                Swal.fire({toast:true,position:'top-end',icon:'info',title:'🔴 العميل يقرأ عرض "'+escapeHtml(d.subject)+'" الآن!',showConfirmButton:false,timer:5000,timerProgressBar:true});
                                                                                }
                                                                }
                                                });
                                });
                }

                };

                                const cfg = PLAN_CONFIG[currentUserDoc.plan]||PLAN_CONFIG.free;
                                document.getElementById('agentPlanBadge').innerHTML = isActive
                                                ? `<div class="alert alert-success" style="margin:0;font-size:.82rem;">✅ ${escapeHtml(cfg.name)}</div>`
                                                : `<div class="alert alert-info" style="margin:0;font-size:.82rem;">⭐ الباقة المجانية</div>`;

                                const subInfo = document.getElementById('agentSubInfo');
                                if (isActive && currentUserDoc.expiry) {
                                                subInfo.style.display='flex';
                                                document.getElementById('agentSubPlan').textContent = cfg.name;
                                                document.getElementById('agentSubExpiry').textContent = formatExpiry(currentUserDoc.expiry);
                                                document.getElementById('agentSubQuota').textContent = Math.max(0,(currentUserDoc.quota||0)-(currentUserDoc.quotaUsed||0))+' عرض';
                                } else subInfo.style.display='none';

                                renderActivateSection('agentActivateSection','agentActivateErr',isActive);

                                // my proposals
                                const propsQ = query(collection(db,'proposals'), where('userId','==',currentUser.uid));
                                const propsSnap = await getDocs(propsQ);
                                const myProps = propsSnap.docs.map(d=>({id:d.id,...d.data()}));

                                document.getElementById('agTotalProps').textContent = myProps.length;
                                document.getElementById('agPending').textContent = myProps.filter(p=>p.status==='pending').length;
                                document.getElementById('agSent').textContent = myProps.filter(p=>p.status==='sent').length;
                                document.getElementById('agAccepted').textContent = myProps.filter(p=>p.status==='accepted').length;

                                // approved alert
                                const approved = myProps.filter(p=>p.status==='approved');
                                const approvedAlert = document.getElementById('agentApprovedAlert');
                                if (approvedAlert) {
                                                if (approved.length>0) {
                                                                approvedAlert.style.display='block';
                                                                approvedAlert.innerHTML=`✅ لديك <strong>${approved.length}</strong> عرض معتمد جاهز للإرسال للعميل!`;
                                                } else approvedAlert.style.display='none';
                                }

                                // rejections
                                const rejDiv = document.getElementById('agentRejections');
                                rejDiv.innerHTML='';
                                myProps.filter(p=>p.status==='rejected').forEach(p => {
                                                const div=document.createElement('div'); div.className='alert alert-danger';
                                                div.textContent=`❌ تم رفض عرضك "${p.subject}"${p.rejectReason?' السبب: '+p.rejectReason:''}`;
                                                rejDiv.appendChild(div);
                                });

                                const container = document.getElementById('agentProposalList');
                                container.innerHTML='';
                                if (myProps.length===0) {
                                                container.innerHTML='<div class="empty-state"><div class="empty-icon">📄</div><div>لا يوجد عروض بعد</div></div>';
                                                return;
                                }
                                const list=document.createElement('div'); list.className='proposal-list';
                                myProps.slice().sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).forEach(p => {
                                                const status=statusMap()[p.status]||statusMap().draft;
                                                const liveBadge = p.isClientLive ? ' <span class="live-badge">🔴 يقرأ الآن</span>' : '';
                                                const item=document.createElement('div'); item.className='proposal-item';
                                                item.innerHTML=`
                                                <div>
                                                                <div class="prop-title">${escapeHtml(p.subject)}${liveBadge}</div>
                                                                <div class="prop-client">${escapeHtml(p.clientCompany)} · ${escapeHtml(p.ref)} · 👁 ${p.viewCount||0} مشاهدة</div>
                                                </div>
                                                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                                                                <span class="prop-amount">${formatAmount(p.total)} ريال</span>
                                                                <span class="status-badge ${status[1]}">${status[0]}</span>
                                                                <button class="btn btn-ghost btn-sm" onclick="openProposal('${p.id}')">عرض</button>
                                                </div>`;
                                                list.appendChild(item);
                                });
                                container.appendChild(list);
                }

                function statusMap() {
                                return {
                                                draft: ['مسودة', 's-draft'],
                                                pending: ['بانتظار الاعتماد', 's-pending'],
                                                approved: ['✅ معتمد - أرسله للعميل', 's-approved'],
                                                sent: ['مُرسَل', 's-sent'],
                                                accepted: ['مقبول', 's-accepted'],
                                                rejected: ['مرفوض', 's-rejected']
                                };
                }

                function renderActivateSection(sectionId, errId, isActive) {
                                const sec = document.getElementById(sectionId); if(!sec)return;
                                sec.innerHTML='';
                                if (isActive) {
                                                sec.innerHTML=`<div style="display:flex;align-items:center;gap:10px;background:#f0f0f0;border-radius:10px;padding:10px 14px;margin-bottom:12px;"><span>🔒</span><span style="font-size:.84rem;color:#666;">الاشتراك فعّال</span></div>`;
                                } else {
                                                sec.innerHTML=`
                                                <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;">
                                                                <div style="flex:1;min-width:180px;">
                                                                                <label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:5px;">🔑 رمز التفعيل (اختياري)</label>
                                                                                <input id="${sectionId}_code" placeholder="PQ-XXXX-XXXX" style="width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;letter-spacing:1px;font-family:inherit;"/>
                                                                </div>
                                                                <button class="btn btn-primary" onclick="doActivateDash('${sectionId}_code','${errId}')">✓ تفعيل</button>
                                                </div>
                                                <div id="${errId}" class="alert alert-warn" style="display:none;"></div>`;
                                }
                }

                async function applyToken(code, errId) {
                                const q = query(collection(db,'tokens'), where('code','==',code), where('used','==',false));
                                const snap = await getDocs(q);
                                if (snap.empty) { showError(errId,'الرمز غير صحيح أو مستخَدم مسبقاً'); return false; }
                                const tokenDoc = snap.docs[0];
                                const plan = tokenDoc.data().plan;
                                const cfg = PLAN_CONFIG[plan]||{quota:30,months:1};
                                const expiry = new Date(); expiry.setMonth(expiry.getMonth()+cfg.months);

                                await updateDoc(doc(db,'tokens',tokenDoc.id),{used:true, usedBy:currentUser.uid, usedAt:serverTimestamp()});
                                await updateDoc(doc(db,'users',currentUser.uid),{plan, quota:cfg.quota, quotaUsed:0, expiry:expiry.toISOString()});

                                // update company too
                                if (currentUserDoc?.companyId) {
                                                await updateDoc(doc(db,'companies',currentUserDoc.companyId),{plan, quota:cfg.quota, expiry:expiry.toISOString()});
                                                // update all agents in company
                                                const agentsQ = query(collection(db,'users'), where('companyId','==',currentUserDoc.companyId), where('role','==','agent'));
                                                const agentsSnap = await getDocs(agentsQ);
                                                agentsSnap.forEach(async ag => {
                                                                await updateDoc(doc(db,'users',ag.id),{plan, quota:cfg.quota, expiry:expiry.toISOString()});
                                                });
                                }

                                const freshSnap = await getDoc(doc(db,'users',currentUser.uid));
                                if (freshSnap.exists()) currentUserDoc = {id:currentUser.uid,...freshSnap.data()};
                                return true;
                }

                window.doActivateDash = async (inputId, errId) => {
                                const code = (document.getElementById(inputId)?.value||'').trim().toUpperCase();
                                if (!code) { showError(errId,'أدخل رمز التفعيل'); return; }
                                if (await applyToken(code,errId)) {
                                                if (currentUserDoc?.role==='manager') refreshManagerDash(); else refreshAgentDash();
                                }
                };

                window.doActivate = async () => {
                                const code = document.getElementById('activationCode').value.trim().toUpperCase();
                                if (await applyToken(code,'activateError')) {
                                                const cfg = PLAN_CONFIG[currentUserDoc?.plan]||PLAN_CONFIG.free;
                                                document.getElementById('activateDetails').innerHTML=`<div style="font-size:.85rem;color:var(--muted)">الباقة: <strong>${escapeHtml(cfg.name)}</strong> · رصيد العروض: <strong>${cfg.quota}</strong></div>`;
                                                document.getElementById('activateSuccess').style.display='block';
                                                if (currentUserDoc?.role==='manager') refreshManagerDash(); else refreshAgentDash();
                                }
                };

                async function checkQuota() {
                                if (!currentUserDoc) return true;
                                const snap = await getDoc(doc(db,'users',currentUser.uid));
                                const u = snap.data();
                                if (!u) return true;
                                if (!u.plan || u.plan==='free') {
                                                const propsQ = query(collection(db,'proposals'), where('userId','==',currentUser.uid));
                                                const propsSnap = await getDocs(propsQ);
                                                if (propsSnap.size >= 3) { alert('وصلت للحد الأقصى للباقة المجانية (3 عروض).\nيرجى تفعيل اشتراك للمتابعة.'); return false; }
                                                return true;
                                }
                                if (Math.max(0,(u.quota||0)-(u.quotaUsed||0)) <= 0) { alert('انتهت العروض المتاحة في باقتك.'); return false; }
                                return true;
                }

                async function deductQuota() {
                                if (!currentUserDoc || !currentUserDoc.plan || currentUserDoc.plan==='free') return;
                                await updateDoc(doc(db,'users',currentUser.uid),{quotaUsed: increment(1)});
                }

                window.addItem = (name='',qty=1,price=0) => {
                                const tbody=document.getElementById('itemsBody');
                                const row=document.createElement('tr');
                                row.innerHTML=`<td><input placeholder="اسم البند" value="${escapeHtml(name)}" oninput="recalcTotals()"/></td><td><input type="number" min="1" value="${qty}" style="width:55px;" oninput="recalcTotals()"/></td><td><input type="number" min="0" value="${price}" oninput="recalcTotals()"/></td><td><button class="del-row" onclick="this.closest('tr').remove();recalcTotals()">✕</button></td>`;
                                tbody.appendChild(row);
                                recalcTotals();
                };

                window.recalcTotals = () => {
                                let subtotal=0;
                                document.querySelectorAll('#itemsBody tr').forEach(row => {
                                                const inputs=row.querySelectorAll('input');
                                                subtotal+=(parseFloat(inputs[1]?.value)||0)*(parseFloat(inputs[2]?.value)||0);
                                });
                                const discount=parseFloat(document.getElementById('propDiscount').value)||0;
                                const afterDiscount=Math.max(0,subtotal-discount);
                                const vat=afterDiscount*0.15;
                                const total=afterDiscount+vat;

                                document.getElementById('totSubtotal').textContent=formatAmount(subtotal)+' ريال';
                                document.getElementById('totDiscount').textContent='- '+formatAmount(discount)+' ريال';
                                document.getElementById('totAfterDiscount').textContent=formatAmount(afterDiscount)+' ريال';
                                document.getElementById('totVAT').textContent=formatAmount(vat)+' ريال';
                                document.getElementById('totFinal').textContent=formatAmount(total)+' ريال';
                                return {subtotal,discount,afterDiscount,vat,total};
                };

                window.handleLogoUpload = e => {
                                const file=e.target.files[0]; if(!file)return;
                                if(!file.type.startsWith('image/')){alert('الرجاء رفع ملف صورة صالح');return;}
                                const r=new FileReader();
                                r.onload=ev=>{logoDataURL=ev.target.result;document.getElementById('logoPreview').src=logoDataURL;document.getElementById('logoPreview').style.display='block';document.getElementById('logoPlaceholderText').style.display='none';document.getElementById('removeLogoBtn').style.display='inline-flex';};
                                r.readAsDataURL(file);
                };
                window.removeLogo=()=>{logoDataURL=null;document.getElementById('logoPreview').style.display='none';document.getElementById('logoPlaceholderText').style.display='block';document.getElementById('removeLogoBtn').style.display='none';document.getElementById('logoFileInput').value='';};

                window.handleStampUpload = e => {
                                const file=e.target.files[0]; if(!file)return;
                                if(!file.type.startsWith('image/')){alert('الرجاء رفع ملف صورة صالح');return;}
                                const r=new FileReader();
                                r.onload=ev=>{stampDataURL=ev.target.result;document.getElementById('stampPreview').src=stampDataURL;document.getElementById('stampPreview').style.display='block';document.getElementById('stampPlaceholderText').style.display='none';document.getElementById('removeStampBtn').style.display='inline-flex';};
                                r.readAsDataURL(file);
                };
                window.removeStamp=()=>{stampDataURL=null;document.getElementById('stampPreview').style.display='none';document.getElementById('stampPlaceholderText').style.display='block';document.getElementById('removeStampBtn').style.display='none';document.getElementById('stampFileInput').value='';};

                function gatherProposalData(aiText='') {
                                const tots=recalcTotals();
                                const payTerms=document.getElementById('propPaymentTerms').value==='custom'
                                                ? document.getElementById('propPaymentTermsCustom').value
                                                : document.getElementById('propPaymentTerms').value;
                                const items=[];
                                document.querySelectorAll('#itemsBody tr').forEach(row => {
                                                const inputs=row.querySelectorAll('input');
                                                const name=inputs[0]?.value.trim();
                                                const qty=parseFloat(inputs[1]?.value)||0;
                                                const price=parseFloat(inputs[2]?.value)||0;
                                                if(name) items.push({name,qty,price,total:qty*price});
                                });
                                return {
                                                userId:currentUser.uid, companyId:currentUserDoc.companyId||null,
                                                date:new Date().toLocaleDateString('ar-SA'),
                                                myCompany:document.getElementById('myCompany').value.trim(),
                                                myTitle:document.getElementById('myTitle').value.trim(),
                                                myCR:document.getElementById('myCR').value.trim(),
                                                myVAT:document.getElementById('myVAT').value.trim(),
                                                clientCompany:document.getElementById('clientCompany').value.trim(),
                                                clientContact:document.getElementById('clientContact').value.trim(),
                                                clientCity:document.getElementById('clientCity').value,
                                                clientEmail:document.getElementById('clientEmail').value.trim(),
                                                subject:document.getElementById('propSubject').value.trim(),
                                                sector:document.getElementById('propSector').value,
                                                validity:parseInt(document.getElementById('propValidity').value)||30,
                                                duration:document.getElementById('propDuration').value.trim(),
                                                paymentTerms:payTerms,
                                                notes:document.getElementById('propNotes').value.trim(),
                                                items, ...tots, aiText, logoDataURL, stampDataURL,
                                                status:'draft', viewCount:0, isClientLive:false, createdAt:serverTimestamp()
                                };
                }

                window.saveProposal = async status => {
                                if (!currentUser) { showModal('loginModal'); return; }
                                if (!await checkQuota()) return;
                                const data=gatherProposalData();
                                if (!data.myCompany||!data.clientCompany||!data.subject) { alert('يرجى ملء الحقول الإلزامية: اسم الشركة، اسم العميل، موضوع العرض'); return; }

                                const propsQ=query(collection(db,'proposals'),where('userId','==',currentUser.uid));
                                const propsSnap=await getDocs(propsQ);
                                data.ref=generateRef(propsSnap.size);
                                data.status=status;

                                // save images in localStorage
                                const logoKey='logo_'+currentUser.uid;
                                const stampKey='stamp_'+currentUser.uid;
                                try { if(data.logoDataURL) localStorage.setItem(logoKey, data.logoDataURL); } catch(e){}
                                try { if(data.stampDataURL) localStorage.setItem(stampKey, data.stampDataURL); } catch(e){}
                                const dataForFirestore={...data};
                                delete dataForFirestore.logoDataURL;
                                delete dataForFirestore.stampDataURL;
                                try {
                                                const docRef=await addDoc(collection(db,'proposals'),dataForFirestore);
                                                await deductQuota();
                                                currentProposalId=docRef.id;
                                                await openProposal(docRef.id);
                                } catch(e) { alert('خطأ في الحفظ: '+e.message); }
                };

                window.generateAI = async () => {
                                if (!currentUser){showModal('loginModal');return;}
                                if (!await checkQuota())return;
                                const data=gatherProposalData();
                                if (!data.myCompany||!data.clientCompany||!data.subject){alert('يرجى ملء الحقول الإلزامية أولاً');return;}

                                showModal('aiGeneratingModal');
                                const steps=['صياغة عرض احترافي...','تخصيص النص للقطاع...','التحليل...','مراجعة نهائية...'];
                                let si=0;
                                const stepsEl=document.getElementById('aiLoadingStep');
                                const timer=setInterval(()=>{stepsEl.textContent=steps[si++%steps.length];},1200);

                                function generateLocalText(d) {
                                                const items=d.items.filter(i=>i.name).map(i=>i.name).join(' و');
                                                return `بسم الله الرحمن الرحيم\n\nالسادة / ${d.clientCompany} المحترمون،${d.clientContact?'\nأ. '+d.clientContact+' المحترم،':''}\n\nالسلام عليكم ورحمة الله وبركاته،\n\nيسعد ${d.myCompany} أن تتقدم لكم بهذا العرض التقني والمالي المتكامل لتنفيذ مشروع "${d.subject}"، انطلاقاً من إيماننا بأن شراكتنا مع ${d.clientCompany} ستُسهم في تحقيق أهدافكم الاستراتيجية بكفاءة عالية.\n\nتضمّن هذا العرض ${items?'تفاصيل دقيقة لـ '+items+'،':'منظومة متكاملة من الخدمات المتخصصة،'} وقد أعددناه وفق أعلى معايير الجودة المعتمدة في قطاع ${d.sector||'الأعمال'}، مع الالتزام التام بالجدول الزمني${d.duration?' والبالغ '+d.duration:''}\n\nنحرص دائماً على تقديم أفضل قيمة مقابل الاستثمار؛ إذ تشمل خدماتنا الدعم الفني المستمر وضمان الجودة. وقد رصدنا الإجمالي الكلي بمبلغ ${formatAmount(d.total)} ريال سعودي شاملاً ضريبة القيمة المضافة 15%.\n\nنتطلع إلى شرف التعاون معكم،\n${d.myCompany}${d.myTitle?'\n'+d.myTitle:''}`;
                                }

                                let aiText='';
                                try {
                                                const prompt=`أنت خبير في كتابة عروض الأسعار التجارية الاحترافية باللغة العربية الفصحى للسوق السعودية.\nاكتب نص عرض سعر احترافي ومقنع:\n- مُقِّدم العرض: ${data.myCompany}\n- العميل: ${data.clientCompany} (${data.clientContact||''}) في ${data.clientCity||''}\n- موضوع العرض: ${data.subject}\n- القطاع: ${data.sector}\n- مدة التنفيذ: ${data.duration||'حسب الاتفاق'}\n- شروط الدفع: ${data.paymentTerms}\n- الإجمالي شامل الضريبة: ${formatAmount(data.total)} ريال\n- البنود: ${data.items.map(i=>i.name).join('، ')}\n- ملاحظات: ${data.notes||'لا يوجد'}\nاكتب فقرات متواصلة احترافية. لا تستخدم عناوين أو نقاط.`;
                                                const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
                                                const result=await resp.json();
                                                aiText=result.content?.[0]?.text||'';
                                                if(!aiText)throw new Error('empty');
                                } catch(e) { aiText=generateLocalText(data); }

                                clearInterval(timer);
                                closeModal('aiGeneratingModal');

                                const propsQ=query(collection(db,'proposals'),where('userId','==',currentUser.uid));
                                const propsSnap=await getDocs(propsQ);
                                data.ref=generateRef(propsSnap.size);
                                data.aiText=aiText; data.status='draft';

                                const logoKey = 'logo_' + currentUser.uid;
                                const stampKey = 'stamp_' + currentUser.uid;
                                try { if (data.logoDataURL) localStorage.setItem(logoKey, data.logoDataURL); } catch(e){}
                                try { if (data.stampDataURL) localStorage.setItem(stampKey, data.stampDataURL); } catch(e){}
                                const dataForFirestore = {...data};
                                delete dataForFirestore.logoDataURL;
                                delete dataForFirestore.stampDataURL;
                                try {
                                                const docRef=await addDoc(collection(db,'proposals'), dataForFirestore);
                                                await deductQuota();
                                                currentProposalId=docRef.id;
                                                const fullData={id:docRef.id,...dataForFirestore,
                                                                logoDataURL: (()=>{try{return localStorage.getItem(logoKey);}catch(e){return null;}})(),
                                                                stampDataURL: (()=>{try{return localStorage.getItem(stampKey);}catch(e){return null;}})()
                                                };
                                                renderPreview(fullData, aiText);
                                                showPage('pagePreview');
                                                document.getElementById('aiEditSection').style.display='block';
                                                document.getElementById('aiEditTextarea').value=aiText;
                                } catch(e) {
                                                clearInterval(timer);
                                                closeModal('aiGeneratingModal');
                                                alert('خطأ في الحفظ: '+e.message);
                                }
                };

                window.confirmAIText = async () => {
                                const text=document.getElementById('aiEditTextarea').value;
                                if (!currentProposalId)return;
                                await updateDoc(doc(db,'proposals',currentProposalId),{aiText:text});
                                document.getElementById('aiEditSection').style.display='none';
                                document.getElementById('paperAIText').textContent=text;
                                alert('✅ تم حفظ العرض بالنص المعَّدل');
                };

                window.openProposal = async id => {
                                const snap=await getDoc(doc(db,'proposals',id));
                                if (!snap.exists())return;
                                currentProposalId=id;
                                const p={id,...snap.data()};
                                if(currentUser){
                                                p.logoDataURL = (()=>{try{return localStorage.getItem('logo_'+p.userId);}catch(e){return null;}})();
                                                p.stampDataURL = (()=>{try{return localStorage.getItem('stamp_'+p.userId);}catch(e){return null;}})();
                                }
                                renderPreview(p, p.aiText);
                                showPage('pagePreview');
                                document.getElementById('aiEditSection').style.display='none';
                                updateTrackingUI(p);
                };

                function renderPreview(p, aiText) {
                                document.getElementById('fomoDays').textContent=p.validity||30;
                                const logoImg=document.getElementById('paperLogoImg');
                                if(p.logoDataURL){logoImg.src=p.logoDataURL;logoImg.style.display='block';}else logoImg.style.display='none';

                                document.getElementById('paperCompanyName').textContent=p.myCompany||'ProposalIQ';
                                document.getElementById('paperCompanyTitle').textContent=p.myTitle||'';
                                document.getElementById('paperRef').textContent=p.ref||'PQ-2026-001';
                                document.getElementById('paperDate').textContent='التاريخ: '+(p.date||'—');
                                document.getElementById('paperValidity2').textContent='الصلاحية: '+(p.validity||30)+' يوم';

                                document.getElementById('partyFromName').textContent=p.myCompany||'—';
                                document.getElementById('partyFromTitle').textContent=p.myTitle||'';
                                document.getElementById('partyFromCR').textContent=p.myCR?'س.ت: '+p.myCR:'';
                                document.getElementById('partyFromVAT').textContent=p.myVAT?'VAT: '+p.myVAT:'';
                                document.getElementById('partyToName').textContent=p.clientCompany||'—';
                                document.getElementById('partyToContact').textContent=p.clientContact||'';
                                document.getElementById('partyToCity').textContent=p.clientCity||'';
                                document.getElementById('partyToEmail').textContent=p.clientEmail||'';
                                document.getElementById('paperSubject').textContent=p.subject||'—';
                                document.getElementById('paperSector').textContent=p.sector?'القطاع: '+p.sector:'';
                                document.getElementById('paperAIText').textContent=aiText||p.aiText||'لم يتم توليد نص بعد.';

                                const tbody=document.getElementById('paperItemsBody');
                                tbody.innerHTML='';
                                (p.items||[]).forEach((item,i) => {
                                                const tr=document.createElement('tr');
                                                [i+1,item.name,item.qty,formatAmount(item.price)+' س.ر',formatAmount(item.total)+' س.ر'].forEach(v=>{
                                                                const td=document.createElement('td'); td.textContent=v; tr.appendChild(td);
                                                });
                                                tbody.appendChild(tr);

                                document.getElementById('paperTotalsBody').innerHTML=`

                window.generateToken = async () => {
                                const plan=document.getElementById('tokenPlan').value;
                                const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                                const rand4=()=>Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
                                const code=`PQ-${rand4()}-${rand4()}`;

                                const localTokens=JSON.parse((()=>{try{return localStorage.getItem('pq_tokens');}catch(e){return '[]';}})() || '[]');
                                localTokens.push({code,plan,used:false,createdAt:new Date().toISOString()});
                                try { try{localStorage.setItem('pq_tokens',JSON.stringify(localTokens));}catch(e){} } catch(e){}

                                try {
                                                await addDoc(collection(db,'tokens'),{code,plan,used:false,createdAt:serverTimestamp()});
                                } catch(e) { /* fallback: localStorage only */ }

                                document.getElementById('newTokenCode').textContent=code;
                                document.getElementById('newTokenResult').style.display='block';
                                const msg=encodeURIComponent(`مرحباً 👋\nرمز تفعيل ProposalIQ:\n*${code}*\nأدخله في المنصة لتفعيل اشتراكك.`);

                async function renderTokensList() {
                                const container=document.getElementById('tokensList');
                                container.innerHTML='';
                                let tokens=[];
                                try {
                                                const snap=await getDocs(collection(db,'tokens'));
                                                if(!snap.empty) tokens=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
                                                else throw new Error('empty');
                                } catch(e) {
                                                tokens=JSON.parse((()=>{try{return localStorage.getItem('pq_tokens');}catch(e){return '[]';}})() || '[]').slice().reverse();
                                }
                                if(!tokens.length){container.innerHTML='<div style="text-align:center;padding:18px;color:var(--muted)">لا يوجد رموز بعد</div>';return;}
                                tokens.forEach(t => {
                                                const item=document.createElement('div'); item.className='token-item';
                                                const planName=PLAN_CONFIG[t.plan]?.name||t.plan;
                                                item.innerHTML=`<span class="token-code">${escapeHtml(t.code)}</span><span style="font-size:.8rem;color:var(--muted);">${escapeHtml(planName)}</span><span class="status-badge ${t.used?'s-accepted':'s-draft'}">${t.used?'مستخدَم':'متاح'}</span>`;
                                                container.appendChild(item);
                                });
                }

                function startFomoCountdown(validityDays, dateStr) {
                                if(fomoInterval) clearInterval(fomoInterval);
                                const fomoEl = document.getElementById('clientFomoTimer');
                                if(!fomoEl) return;
                                let createdDate;
                                try { createdDate = new Date(dateStr); } catch(e) { createdDate = new Date(); }
                                if(isNaN(createdDate.getTime())) createdDate = new Date();
                                const expiryDate = new Date(createdDate.getTime() + (validityDays||30)*24*60*60*1000);
                                function updateTimer() {
                                                const now = new Date();
                                                const diff = expiryDate - now;
                                                if(diff <= 0) {
                                                                fomoEl.innerHTML = '⛔ انتهت صلاحية هذا العرض';
                                                                fomoEl.style.background = 'linear-gradient(135deg,#c53030,#e53e3e)';
                                                                clearInterval(fomoInterval);
                                                                return;
                                                }
                                                const days = Math.floor(diff/(1000*60*60*24));
                                                const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
                                                const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
                                                const seconds = Math.floor((diff%(1000*60))/1000);
                                                fomoEl.innerHTML = `<span style="font-size:1.3rem;">⏰</span><div style="flex:1;"><div style="font-weight:700;font-size:.9rem;">⚠️ ينتهي هذا العرض خلال:</div><div style="font-size:1.4rem;font-weight:900;letter-spacing:2px;font-family:monospace;margin-top:4px;">${days} يوم ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}</div></div>`;
                                }
                                updateTimer();
                                fomoInterval = setInterval(updateTimer, 1000);
                }

                                const el = document.getElementById('clientSelectedTotal');

                                                                <div id="paymentSection" style="display:${hasSignature?'block':'none'};margin-top:16px;"><div style="background:linear-gradient(135deg,#1a4f8a,#2d6abf);color:#fff;border-radius:12px;padding:20px;text-align:center;"><div style="font-size:1.3rem;margin-bottom:8px;">💳</div><div style="font-weight:700;font-size:1rem;margin-bottom:6px;">ادفع العربون لتأكيد الطلب</div><div style="font-size:.85rem;opacity:.8;margin-bottom:14px;">يمكنك دفع العربون الآن لتأكيد حجز الخدمة</div><a href="https://wa.me/${WA_NUMBER}?text=${encodeURIComponent('مرحباً، أريد دفع العربون للعرض: '+(p.ref||''))}" target="_blank" class="btn" style="background:#fff;color:var(--primary);font-weight:800;padding:12px 28px;font-size:.95rem;">💳 دفع العربون عبر تحويل بنكي</a><div style="font-size:.75rem;opacity:.6;margin-top:10px;">Apple Pay و مدى قريباً</div></div></div>
                                                                <div style="text-align:center;margin-top:20px;"><a href="https://wa.me/${WA_NUMBER}" target="_blank" class="btn btn-wa">📱 للقبول أو الاستفسار تواصل واتساب</a></div>
                                                </div>
                                                <div class="paper-footer">تم إنشاء هذا العرض عبر · ProposalIQ · ARKANE AI · ${escapeHtml(p.myCompany||'')}</div>
                                </div>`;
                                setTimeout(()=>{
                                                initSignaturePad('sig-canvas');
                                                startFomoCountdown(p.validity||30, p.date);
                                }, 300);
                }

                function initSignaturePad(canvasId) {
                                const canvas = document.getElementById(canvasId);
                                if (!canvas) return;
                                const ctx = canvas.getContext('2d');
                                let writing = false;
                                let lastX = 0, lastY = 0;

                                const getPos = (e) => {
                                                const rect = canvas.getBoundingClientRect();
                                                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                                                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                                                return {
                                                                x: (clientX - rect.left) * (canvas.width / rect.width),
                                                                y: (clientY - rect.top) * (canvas.height / rect.height)
                                                };
                                };

                                const startDraw = (e) => {
                                                e.preventDefault();
                                                writing = true;
                                                const pos = getPos(e);
                                                lastX = pos.x; lastY = pos.y;
                                };
                                const endDraw = () => { writing = false; ctx.beginPath(); };
                                const draw = (e) => {
                                                if (!writing) return;
                                                e.preventDefault();
                                                const pos = getPos(e);
                                                ctx.strokeStyle = '#1a4f8a';
                                                ctx.lineWidth = 2;
                                                ctx.lineCap = 'round';
                                                ctx.lineJoin = 'round';
                                                ctx.beginPath();
                                                ctx.moveTo(lastX, lastY);
                                                ctx.lineTo(pos.x, pos.y);
                                                ctx.stroke();
                                                lastX = pos.x; lastY = pos.y;
                                };

                                canvas.addEventListener('mousedown', startDraw);
                                canvas.addEventListener('mouseup', endDraw);
                                canvas.addEventListener('mouseleave', endDraw);
                                canvas.addEventListener('mousemove', draw);
                                canvas.addEventListener('touchstart', startDraw, {passive:false});
                                canvas.addEventListener('touchend', endDraw);
                                canvas.addEventListener('touchmove', draw, {passive:false});
                }

                window.clearSignature = () => {
                                const canvas = document.getElementById('sig-canvas');
                                if(!canvas) return;
                                const ctx = canvas.getContext('2d');
                                ctx.clearRect(0, 0, canvas.width, canvas.height);
                };

                window.saveClientSignature = async (proposalId) => {
                                const canvas = document.getElementById('sig-canvas');
                                if (!canvas) return;
                                const ctx = canvas.getContext('2d');
                                const pixelData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                                let hasDrawing = false;
                                for(let i=3; i<pixelData.length; i+=4) { if(pixelData[i] > 0) { hasDrawing=true; break; } }
                                if(!hasDrawing) { Swal.fire('⚠️','يرجى التوقيع أولاً قبل الاعتماد','warning'); return; }
                                const dataURL = canvas.toDataURL('image/png');
                                try {
                                                await updateDoc(doc(db,'proposals',proposalId), {
                                                                clientSignature: dataURL,
                                                                signedAt: serverTimestamp(),
                                                                status: 'accepted'
                                                });
                                                const sigSection = document.getElementById('clientSignatureSection');
                                                if(sigSection) sigSection.style.display='none';
                                                const paySection = document.getElementById('paymentSection');
                                                if(paySection) paySection.style.display='block';
                                                Swal.fire({icon:'success',title:'✅ تم اعتماد التوقيع',text:'شكراً لثقتكم! تم قبول العرض رسمياً.',confirmButtonText:'تم'});
                                } catch(e) {
                                                Swal.fire({icon:'success',title:'تم حفظ التوقيع',text:'شكراً لثقتكم!'});
                                }
                };

                const pricingData={
                                monthly:{basic:'240 <span>ريال/شهر</span>',advanced:'600 <span>ريال/شهر</span>',enterprise:'18,000 <span>ريال/سنة</span>'},
                                quarterly:{basic:'599 <span>ريال/ربع</span>',advanced:'1,499 <span>ريال/ربع</span>',enterprise:'18,000 <span>ريال/سنة</span>'},
                                yearly:{basic:'1,999 <span>ريال/سنة</span>',advanced:'4,999 <span>ريال/سنة</span>',enterprise:'18,000 <span>ريال/سنة</span>'}
                };
                window.setPricingPeriod=p=>{'Monthly,Quarterly,Yearly'.split(',').forEach(k=>document.getElementById('tog'+k).classList.remove('active'));document.getElementById('tog'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');document.getElementById('priceBasic').innerHTML=pricingData[p].basic;document.getElementById('priceAdvanced').innerHTML=pricingData[p].advanced;document.getElementById('priceEnterprise').innerHTML=pricingData[p].enterprise;};

                document.addEventListener('change',e => {
                                if(e.target.id==='propPaymentTerms') document.getElementById('propPaymentTermsCustom').style.display=e.target.value==='custom'?'block':'none';
                });
                document.addEventListener('input',e => {
                                if(e.target.id==='regPassword2'||e.target.id==='regPassword') {
                                                const p1=document.getElementById('regPassword')?.value||'';
                                                const p2=document.getElementById('regPassword2')?.value||'';
                                                const hint=document.getElementById('passMatchHint');
                                                if(!hint||!p2){if(hint)hint.style.display='none';return;}
                                                hint.style.display='block';
                                                if(p1===p2){hint.textContent='✅ متطابقتان';hint.style.color='#17a85a';}
                                                else{hint.textContent='❌ غير متطابقتين';hint.style.color='#d63031';}
                                }
                });

</script>
