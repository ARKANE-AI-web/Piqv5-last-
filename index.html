<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <title>ProposalIQ - منصة العروض الذكية</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* الألوان والتصميم الأصلي (حسب الـ PDF) */
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; }
        .navbar { background: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-pay { background: #28a745; color: white; } /* زر الدفع الجديد */
        
        /* إضافات المرحلة 2 (الأهداف والدردشة) */
        .progress-container { background: #eee; border-radius: 10px; height: 15px; margin: 10px 0; }
        .progress-bar { background: var(--primary-color); height: 100%; border-radius: 10px; width: 0%; transition: 0.5s; }
        #chat-widget { position: fixed; bottom: 20px; left: 20px; width: 300px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="font-size: 20px; font-weight: bold; color: var(--primary-color);">ProposalIQ</div>
    <div id="user-info">
        <button class="btn btn-primary" onclick="showPage('login-page')">دخول</button>
    </div>
</nav>

<div class="container">
    
    <div id="login-page" class="page active">
        <div class="card" style="max-width: 400px; margin: auto; text-align: center;">
            <h2>تسجيل الدخول</h2>
            <input type="email" id="login-email" placeholder="البريد الإلكتروني" style="width: 90%; padding: 10px; margin: 10px 0;">
            <input type="password" id="login-pass" placeholder="كلمة المرور" style="width: 90%; padding: 10px; margin: 10px 0;">
            <button class="btn btn-primary" onclick="app.login()" style="width: 100%;">دخول</button>
            <p style="margin-top: 15px; font-size: 14px;">أو <span style="color: blue; cursor: pointer;" onclick="showPage('register-page')">إنشاء حساب جديد</span></p>
        </div>
    </div>

    <div id="dashboard-page" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>لوحة التحكم</h2>
            <div>
                <button class="btn btn-pay" onclick="app.showPayment()"><i class="fas fa-credit-card"></i> ترقية الحساب</button>
                <button class="btn btn-primary" onclick="showPage('new-proposal')">+ عرض سعر جديد</button>
                <button id="admin-btn" class="btn" style="background: #333; color: white; display: none;" onclick="showPage('admin-page')">الإدارة العليا</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-bullseye"></i> هدف المبيعات الشهري</h3>
            <div class="progress-container"><div id="goal-bar" class="progress-bar"></div></div>
            <p id="goal-text">0 / 50,000 ريال</p>
        </div>

        <div class="card">
            <h3>العروض الأخيرة</h3>
            <div id="proposals-list">قيد التحميل...</div>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="card">
            <h2>توليد رموز التفعيل</h2>
            <select id="token-plan" style="padding: 10px;">
                <option value="basic">الباقة الأساسية</option>
                <option value="pro">الباقة المتقدمة</option>
            </select>
            <input type="number" id="token-count" value="1" style="padding: 10px; width: 60px;">
            <button class="btn btn-primary" onclick="app.generateTokens()">توليد الرموز الآن</button>
            <div id="generated-codes" style="margin-top: 20px; font-family: monospace;"></div>
        </div>
    </div>

</div>

<div id="chat-widget" class="card">
    <div style="background: var(--primary-color); color: white; padding: 10px; margin: -20px -20px 10px -20px; border-radius: 10px 10px 0 0;">
        نقاش داخلي <button onclick="toggleChat()" style="float: left; background: none; border: none; color: white;">✕</button>
    </div>
    <div id="chat-messages" style="height: 200px; overflow-y: auto; font-size: 13px;"></div>
    <input type="text" id="chat-input" placeholder="اكتب ملاحظة..." style="width: 80%;">
    <button onclick="app.sendChat()">></button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "ضع_مفتاحك_هنا",
        authDomain: "proposaliq.firebaseapp.com",
        projectId: "proposaliq",
        storageBucket: "proposaliq.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    const fb = initializeApp(firebaseConfig);
    const auth = getAuth(fb);
    const db = getFirestore(fb);

    window.app = {
        // تسجيل الدخول
        async login() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                Swal.fire('تمت العملية', 'مرحباً بك مجدداً', 'success');
            } catch (e) { Swal.fire('خطأ', 'بيانات الدخول غير صحيحة', 'error'); }
        },

        // توليد الرموز (خاص بالإدارة)
        async generateTokens() {
            const plan = document.getElementById('token-plan').value;
            const count = document.getElementById('token-count').value;
            let codes = [];
            for(let i=0; i<count; i++) {
                const code = "IQ-" + Math.random().toString(36).substring(7).toUpperCase();
                await addDoc(collection(db, "tokens"), { code, plan, used: false });
                codes.push(code);
            }
            document.getElementById('generated-codes').innerHTML = codes.join("<br>");
        },

        // إظهار نافذة الدفع
        showPayment() {
            Swal.fire({
                title: 'اختر باقة الاشتراك',
                html: `
                    <button class="btn btn-primary" onclick="app.pay('basic')">الأساسية (99 ريال)</button><br><br>
                    <button class="btn btn-primary" onclick="app.pay('pro')">المتقدمة (249 ريال)</button>
                `,
                showConfirmButton: false
            });
        },

        async pay(plan) {
            Swal.fire('سيتم توجيهك لبوابة الدفع...', '', 'info');
            // هنا يتم الربط مع Stripe أو Moyasar لاحقاً
        }
    };

    // مراقب الحالة (التأكد من الدخول وعرض الصفحة المناسبة)
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const uDoc = await getDoc(doc(db, "users", user.uid));
            const userData = uDoc.data();
            if(userData.role === 'admin') document.getElementById('admin-btn').style.display = 'inline-block';
            
            document.getElementById('user-info').innerHTML = `${user.email} | <button onclick="signOut(auth)">خروج</button>`;
            window.showPage('dashboard-page');
            loadProposals(user.uid);
        } else {
            window.showPage('login-page');
        }
    });

    function loadProposals(uid) {
        onSnapshot(collection(db, "proposals"), (snap) => {
            let html = "<table style='width:100%'>";
            snap.forEach(d => {
                const p = d.data();
                html += `<tr><td>${p.client}</td><td>${p.total} ريال</td><td>${p.status}</td></tr>`;
            });
            document.getElementById('proposals-list').innerHTML = html + "</table>";
        });
    }

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };
</script>

</body>
</html>
