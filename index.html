<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProposalIQ — منصة العروض الذكية</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* ستايل التصميم الأصلي الخاص بك (الفخم) */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }
        .app-container {
            width: 100%; max-width: 500px;
            background: white; min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding: 20px;
        }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: var(--primary); font-size: 24px; margin: 0; }
        
        .card {
            background: #fff; border: 1px solid #e2e8f0;
            border-radius: 12px; padding: 15px; margin-bottom: 15px;
            transition: 0.3s;
        }
        .btn {
            width: 100%; padding: 12px; border: none;
            border-radius: 10px; cursor: pointer;
            font-weight: 600; margin-top: 10px;
            transition: 0.3s; font-size: 15px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }

        /* ستايل النوافذ المنبثقة */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center; z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px;
            width: 85%; max-width: 400px; text-align: center;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loader { font-size: 40px; color: var(--primary); animation: spin 1s linear infinite; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>ProposalIQ 🚀</h1>
        <p>مرحباً بك في مستقبل العروض</p>
    </div>

    <div class="card">
        <h3>توليد عرض جديد</h3>
        <p style="font-size: 13px; color: #64748b;">استخدم الذكاء الاصطناعي لإنشاء عرض سعر احترافي في ثوانٍ.</p>
        <button class="btn btn-primary" onclick="startAiGeneration()">توليد الآن ⚡</button>
    </div>

    <div class="card">
        <h3>تفعيل الاشتراك</h3>
        <button class="btn btn-primary" onclick="openModal('activationModal')">إدخال رمز التفعيل</button>
    </div>

    <div class="card">
        <h3>🤖 ضمان القبول</h3>
        <button class="btn btn-primary" onclick="openModal('retentionModal')">تحليل الرفض والتعديل</button>
    </div>
</div>

<div class="modal-overlay" id="activationModal">
    <div class="modal-content">
        <h3>تفعيل الحساب</h3>
        <input type="text" id="activationCode" placeholder="أدخل الرمز هنا..." style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <button class="btn btn-primary" onclick="doActivate()">تفعيل</button>
        <button class="btn" onclick="closeModal('activationModal')">إلغاء</button>
    </div>
</div>

<div class="modal-overlay" id="aiGeneratingModal">
    <div class="modal-content">
        <div class="loader">⚡</div>
        <h4 id="aiLoadingStep">جارٍ معالجة البيانات...</h4>
    </div>
</div>

<div class="modal-overlay" id="retentionModal">
    <div class="modal-content">
        <h3>لماذا تم رفض العرض؟</h3>
        <textarea id="rejectionReason" placeholder="اكتب ملاحظات العميل هنا..." style="width:100%; height:80px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
        <button class="btn btn-primary" onclick="analyzeRejection()">إعادة التوليد بتعديلات ذكية</button>
        <button class="btn" onclick="closeModal('retentionModal')">إغلاق</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // إعدادات Firebase الخاصة بك (التي أرسلتها أنت)
    const firebaseConfig = {
        apiKey: "AIzaSyChxttvld06MmlSTD4JB11mYZNA06AP4T8",
        authDomain: "proposaliq-97d80.firebaseapp.com",
        projectId: "proposaliq-97d80",
        storageBucket: "proposaliq-97d80.firebasestorage.app",
        messagingSenderId: "183384951638",
        appId: "1:183384951638:web:8c0d6ce87c0c22f14064f7",
        measurementId: "G-HTD6YLRY8X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // وظائف التحكم
    window.openModal = (id) => document.getElementById(id).classList.add('active');
    window.closeModal = (id) => document.getElementById(id).classList.remove('active');

    window.doActivate = async () => {
        const code = document.getElementById('activationCode').value.trim();
        if(!code) return Swal.fire('تنبيه', 'أدخل الرمز', 'info');

        try {
            const q = query(collection(db, 'tokens'), where('code', '==', code));
            const snap = await getDocs(q);
            if (snap.empty) return Swal.fire('خطأ', 'الرمز غير صحيح', 'error');
            
            const tokenDoc = snap.docs[0];
            if (tokenDoc.data().used) return Swal.fire('تنبيه', 'الرمز مستخدم مسبقاً', 'warning');

            await updateDoc(doc(db, 'tokens', tokenDoc.id), { used: true, usedAt: serverTimestamp() });
            Swal.fire('نجاح', 'تم التفعيل بنجاح! 🚀', 'success');
            closeModal('activationModal');
        } catch (e) {
            Swal.fire('خطأ', 'مشكلة في الصلاحيات (Firebase Rules)', 'error');
        }
    };

    window.startAiGeneration = () => {
        openModal('aiGeneratingModal');
        const steps = ["تحليل الطلب...", "كتابة المحتوى...", "تنسيق العرض...", "جاهز!"];
        let i = 0;
        const interval = setInterval(() => {
            document.getElementById('aiLoadingStep').innerText = steps[i];
            i++;
            if (i >= steps.length) {
                clearInterval(interval);
                setTimeout(() => {
                    closeModal('aiGeneratingModal');
                    Swal.fire('ممتاز', 'تم توليد العرض بنجاح', 'success');
                }, 800);
            }
        }, 1000);
    };

    window.analyzeRejection = () => {
        if(!document.getElementById('rejectionReason').value) return Swal.fire('تنبيه', 'اكتب السبب', 'info');
        closeModal('retentionModal');
        startAiGeneration();
    };
</script>

</body>
</html>
